name: Build Android APK

# Trigger: every push to main OR manual dispatch from the Actions tab
on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: false
        default: 'debug'
        type: choice
        options: [debug, release]

jobs:
  build:
    name: Build APK on Ubuntu (cloud, no local machine required)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Optional yarn cache — silently no-ops if no lockfile is found.
      # setup-node's built-in `cache: 'yarn'` FAILS hard when the lockfile
      # is missing (that's the bug we're fixing), so we use actions/cache
      # directly with hashFiles() guarding the key.
      - name: Cache yarn dependencies
        if: ${{ hashFiles('frontend/yarn.lock', 'yarn.lock') != '' }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yarn
            frontend/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('frontend/yarn.lock', 'yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          if [ -f yarn.lock ]; then
            echo "yarn.lock found — using --frozen-lockfile"
            yarn install --frozen-lockfile
          else
            echo "::warning::yarn.lock not found in frontend/ — running plain 'yarn install' (this may update the lockfile). Commit yarn.lock next time for reproducible builds."
            yarn install
          fi

      - name: Preflight — verify backend is reachable
        env:
          BACKEND_URL: ${{ secrets.VITE_BACKEND_URL || 'https://orbit-vouchers.preview.emergentagent.com' }}
        run: |
          echo "Testing backend at $BACKEND_URL/api/health"
          CODE=$(curl -sL -o /tmp/h -w "%{http_code}" --max-time 10 "$BACKEND_URL/api/health" || echo "000")
          echo "HTTP $CODE"
          if [ "$CODE" != "200" ]; then
            echo "::error::Backend at $BACKEND_URL/api/health returned $CODE — refusing to build a broken APK."
            echo "::error::Set the VITE_BACKEND_URL secret in Settings → Secrets → Actions to a working backend."
            exit 1
          fi

      - name: Build web bundle (vite)
        working-directory: frontend
        env:
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL || 'https://orbit-vouchers.preview.emergentagent.com' }}
        run: yarn build

      - name: Add Android platform if not committed
        working-directory: frontend
        run: |
          if [ ! -d android ]; then
            echo "android/ folder not tracked in repo — generating fresh via 'npx cap add android'"
            npx cap add android
          else
            echo "android/ folder exists in repo — using it"
          fi

      - name: Apply Gradle 8.x + AGP 8.5 template files
        run: |
          if [ -d android-gradle-template ]; then
            mkdir -p frontend/android/gradle/wrapper
            cp android-gradle-template/gradle-wrapper.properties frontend/android/gradle/wrapper/gradle-wrapper.properties
            cp android-gradle-template/variables.gradle          frontend/android/variables.gradle
            cp android-gradle-template/build.gradle              frontend/android/build.gradle
            cp android-gradle-template/gradle.properties         frontend/android/gradle.properties
            echo "Gradle 8.x templates applied"
          else
            echo "::warning::android-gradle-template/ not found — using whatever Gradle version is in the repo"
          fi

      - name: Sync Capacitor plugins into Android
        working-directory: frontend
        run: npx cap sync android

      - name: Build APK
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          echo "Building $BUILD_TYPE APK"
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew :app:assembleRelease --no-daemon --stacktrace
          else
            ./gradlew :app:assembleDebug --no-daemon --stacktrace
          fi

      - name: Locate produced APK
        id: locate
        working-directory: frontend/android
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK was produced."
            ls -R app/build/outputs || true
            exit 1
          fi
          echo "apk_path=frontend/android/$APK" >> "$GITHUB_OUTPUT"
          echo "Built: frontend/android/$APK"
          ls -lh "$APK"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PerkWorth-APK-${{ github.sha }}
          path: ${{ steps.locate.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Success summary
        run: |
          echo "## 🎉 APK build complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Download the APK**: scroll down to the **Artifacts** section of this workflow run and click **PerkWorth-APK-${{ github.sha }}**." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Sideload on your phone**:" >> $GITHUB_STEP_SUMMARY
          echo "1. Extract the downloaded .zip → you get an .apk file" >> $GITHUB_STEP_SUMMARY
          echo "2. Send the .apk to your phone (Google Drive, email, WhatsApp Web → yourself)" >> $GITHUB_STEP_SUMMARY
          echo "3. Tap it to install (enable 'Install from unknown sources' when prompted)" >> $GITHUB_STEP_SUMMARY
