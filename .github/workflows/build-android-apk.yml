name: Build Android APK / AAB

# Trigger: every push to main OR manual dispatch from the Actions tab
on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'debug'
        type: choice
        options: [debug, release, release-aab]
      clean_cache:
        description: 'Wipe all caches (Gradle, Yarn, node_modules) before building'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  build:
    name: Clean-build APK (cloud, no local machine required)
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      # -----------------------------------------------------------------
      # Preflight — print every version we depend on so failures are self-diagnosing
      # -----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Print environment matrix (for support attachments)
        run: |
          echo "=== Runner ==="
          uname -a
          echo ""
          echo "=== Disk before build ==="
          df -h / || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Verify JDK 17
        run: |
          java -version
          javac -version
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Node + Yarn
        run: |
          node -v
          yarn -v
          npx -v

      - name: Set up Android SDK (API 35 + build-tools 35.0.0)
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      # -----------------------------------------------------------------
      # Clean slate — nuke every cache that might taint a build
      # -----------------------------------------------------------------
      - name: Wipe caches for a truly clean build
        if: ${{ github.event.inputs.clean_cache != 'false' }}
        run: |
          echo "Nuking node_modules, dist, frontend/android/build, ~/.gradle/caches"
          rm -rf frontend/node_modules frontend/dist
          rm -rf frontend/android/app/build frontend/android/build frontend/android/.gradle
          rm -rf ~/.gradle/caches ~/.gradle/daemon
          rm -rf ~/.cache/yarn
          echo "✓ Cache wipe complete"

      # -----------------------------------------------------------------
      # Frontend
      # -----------------------------------------------------------------
      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          if [ -f yarn.lock ]; then
            echo "yarn.lock found → --frozen-lockfile"
            yarn install --frozen-lockfile --network-timeout 100000
          else
            echo "::warning::yarn.lock missing — plain yarn install (lockfile may drift)"
            yarn install --network-timeout 100000
          fi

      - name: Preflight — backend health check
        env:
          # HARDCODED to prevent build-time misconfiguration from a stale
          # `VITE_BACKEND_URL` repo secret. If you need to change the
          # backend URL, edit the two occurrences below in this file —
          # NOT the repo secret (secrets are now ignored).
          BACKEND_URL: 'https://orbit-vouchers.preview.emergentagent.com'
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "  Backend URL being baked into APK: $BACKEND_URL"
          echo "════════════════════════════════════════════════════════"
          CODE=$(curl -sL -o /tmp/h -w "%{http_code}" --max-time 10 "$BACKEND_URL/api/health" || echo "000")
          echo "Preflight $BACKEND_URL/api/health → HTTP $CODE"
          BODY=$(head -c 200 /tmp/h)
          echo "Response body: $BODY"
          if [ "$CODE" != "200" ]; then
            echo "::error::Backend at $BACKEND_URL/api/health returned $CODE (expected 200)."
            exit 1
          fi
          # Also assert the body actually looks like our API (not a Vercel
          # 404 or redirect page). Catches the case where the URL returns
          # 200 but from the wrong service (e.g. a Vercel static site).
          if ! echo "$BODY" | grep -q '"status"'; then
            echo "::error::Backend responded 200 but body doesn't look like the FastAPI /api/health response. Got: $BODY"
            exit 1
          fi
          echo "✓ Backend health confirmed"

      - name: Build web bundle (vite)
        working-directory: frontend
        env:
          # SAME hardcoded URL as preflight — never fall back to a secret
          # so we can't ship an APK pointing at a broken URL.
          VITE_BACKEND_URL: 'https://orbit-vouchers.preview.emergentagent.com'
          # Razorpay LIVE key_id — this is the PUBLIC identifier, safe to
          # hardcode. The corresponding key_secret stays server-side only
          # (backend/.env → RAZORPAY_KEY_SECRET, not shipped in APK).
          VITE_RAZORPAY_KEY_ID: 'rzp_live_TAtfKCD0rejxSC'
        run: yarn build

      - name: Verify baked-in URL matches expectation
        working-directory: frontend
        run: |
          EXPECTED='orbit-vouchers.preview.emergentagent.com'
          FOUND=$(grep -oE '"https?://[^"]+"' dist/assets/index-*.js | grep -i preview | head -1 || echo "")
          echo "Expected substring: $EXPECTED"
          echo "Found in bundle:    $FOUND"
          if ! echo "$FOUND" | grep -q "$EXPECTED"; then
            echo "::error::Baked-in URL doesn't contain expected substring. This means vite didn't pick up VITE_BACKEND_URL."
            grep -oE '"https?://[^"]+"' dist/assets/index-*.js | head -20 || true
            exit 1
          fi
          echo "✓ Correct backend URL is baked into the JS bundle"

      # -----------------------------------------------------------------
      # Android platform + Gradle 8.x templates
      # -----------------------------------------------------------------
      - name: Add Android platform if missing
        working-directory: frontend
        run: |
          if [ ! -d android ]; then
            echo "android/ not tracked in repo — generating via 'npx cap add android'"
            npx cap add android
          else
            echo "android/ tracked in repo — reusing"
          fi

      - name: Apply Gradle 8.x + AGP 8.5 template files
        run: |
          if [ ! -d android-gradle-template ]; then
            echo "::warning::android-gradle-template/ missing — using whatever Gradle version is committed"
            exit 0
          fi
          mkdir -p frontend/android/gradle/wrapper
          cp android-gradle-template/gradle-wrapper.properties frontend/android/gradle/wrapper/gradle-wrapper.properties
          cp android-gradle-template/variables.gradle          frontend/android/variables.gradle
          cp android-gradle-template/build.gradle              frontend/android/build.gradle
          cp android-gradle-template/gradle.properties         frontend/android/gradle.properties
          echo "✓ Gradle 8.x templates applied"

      - name: Sync Capacitor plugins into Android
        working-directory: frontend
        run: npx cap sync android

      # -----------------------------------------------------------------
      # Release signing — only when building release or release-aab.
      # Decodes the base64 keystore from GitHub secrets, writes it into the
      # Android project, and injects a signingConfig into app/build.gradle so
      # Gradle's assembleRelease / bundleRelease produce a signed artifact.
      # No-op for debug builds (Android Studio's default debug key is used).
      # -----------------------------------------------------------------
      - name: Inject release signing config (release + release-aab only)
        if: github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'release-aab'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: frontend/android
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::Release build requires all 4 signing secrets (KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD)."
            echo "::error::Set them at https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

          echo "▸ Decoding keystore into app/perkworth-release.keystore"
          echo "$KEYSTORE_BASE64" | base64 -d > app/perkworth-release.keystore
          KS_SIZE=$(stat -c%s app/perkworth-release.keystore)
          if [ "$KS_SIZE" -lt 500 ]; then
            echo "::error::Decoded keystore is only $KS_SIZE bytes — likely corrupted or wrong secret."
            exit 1
          fi
          echo "✓ Keystore decoded ($KS_SIZE bytes)"

          echo "▸ Writing keystore.properties (Gradle picks these up)"
          cat > app/keystore.properties <<EOF
          storeFile=perkworth-release.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          chmod 600 app/keystore.properties
          echo "▸ Verifying keystore.properties was written to app/"
          ls -la app/keystore.properties
          echo "  (sensitive values redacted below — showing only keys present)"
          grep -oE '^[a-zA-Z]+=' app/keystore.properties | sort

          echo "▸ Injecting signingConfig into app/build.gradle if not present"
          if ! grep -q "signingConfigs\.release" app/build.gradle; then
            # Insert signing config just after the `android {` block opener.
            # NOTE: python3 heredoc body MUST be flush-left (column 0) after YAML
            # strips the block-scalar indent, otherwise Python raises
            # IndentationError: unexpected indent.
            python3 <<'PYEOF'
          import re, pathlib
          p = pathlib.Path("app/build.gradle")
          src = p.read_text()
          inject = '''
              def keystorePropertiesFile = rootProject.file("app/keystore.properties")
              def keystoreProperties = new Properties()
              if (keystorePropertiesFile.exists()) {
                  keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
              }

              signingConfigs {
                  release {
                      if (keystorePropertiesFile.exists()) {
                          storeFile file(keystoreProperties['storeFile'])
                          storePassword keystoreProperties['storePassword']
                          keyAlias keystoreProperties['keyAlias']
                          keyPassword keystoreProperties['keyPassword']
                      }
                  }
              }

          '''
          # Insert after first `android {` line
          new = re.sub(r'(android\s*\{)', r'\1\n' + inject, src, count=1)
          # Also add signingConfig to buildTypes.release
          new = re.sub(
              r'(buildTypes\s*\{[^}]*release\s*\{)',
              r'\1\n            signingConfig signingConfigs.release',
              new, count=1, flags=re.DOTALL,
          )
          p.write_text(new)
          print("✓ Signing config injected into app/build.gradle")
          PYEOF
          else
            echo "✓ signingConfigs.release already present in app/build.gradle"
          fi

      # -----------------------------------------------------------------
      # THE ACTUAL BUILD — verbose, no daemon, no cache reuse, stacktrace on
      # -----------------------------------------------------------------
      - name: Print Gradle wrapper version
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew --version || true

      - name: Assemble APK / AAB (clean, verbose, no cache)
        id: assemble
        working-directory: frontend/android
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          case "$BUILD_TYPE" in
            release-aab) TASK="bundleRelease"   ;;   # Google Play requires AAB
            release)     TASK="assembleRelease" ;;   # Signed APK — sideload only
            *)           TASK="assembleDebug"   ;;   # Debug — dev testing only
          esac
          echo "▸ BUILD_TYPE=$BUILD_TYPE → gradle task=$TASK"

          echo "▸ Running: ./gradlew clean :app:$TASK --no-daemon --no-build-cache --refresh-dependencies --info --stacktrace --warning-mode=all"

          # Save full log to a file so we can upload it as an artifact on failure
          mkdir -p ../../build-logs
          set -o pipefail
          ./gradlew clean :app:$TASK \
            --no-daemon \
            --no-build-cache \
            --refresh-dependencies \
            --info \
            --stacktrace \
            --warning-mode=all \
            2>&1 | tee ../../build-logs/gradle-full.log

      # -----------------------------------------------------------------
      # Failure diagnostics — always runs after the build step
      # -----------------------------------------------------------------
      - name: Diagnose Gradle log on failure
        if: failure()
        run: |
          LOG=build-logs/gradle-full.log
          if [ ! -f "$LOG" ]; then
            echo "::warning::No gradle log to diagnose (build failed before log was written)"
            exit 0
          fi
          echo "════════════════════════════════════════════════════════"
          echo "  GRADLE FAILURE DIAGNOSTICS (auto-extracted)"
          echo "════════════════════════════════════════════════════════"
          echo ""
          echo "── Last 100 lines of gradle log ──"
          tail -100 "$LOG"
          echo ""
          echo "── ALL lines containing FAILED/ERROR/Exception ──"
          grep -nE 'FAILURE:|FAILED|ERROR|Exception|error:|>' "$LOG" | tail -50 || echo "(none found)"
          echo ""
          echo "── What went wrong section ──"
          awk '/What went wrong:/,/BUILD FAILED/' "$LOG" | head -80 || true
          echo ""
          echo "── Deprecation/lint issues ──"
          grep -inE 'deprecat|incompatible|manifest merger|resource not found' "$LOG" | head -20 || echo "(none)"
          echo ""
          echo "════════════════════════════════════════════════════════"
          echo "  Full log is uploaded as artifact 'gradle-build-log'"
          echo "════════════════════════════════════════════════════════"

      - name: Upload Gradle log artifact (always — success or failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log-${{ github.run_number }}
          path: build-logs/
          retention-days: 14
          if-no-files-found: warn

      # -----------------------------------------------------------------
      # Success path — locate + upload the APK or AAB
      # -----------------------------------------------------------------
      - name: Locate produced APK / AAB
        if: success()
        id: locate
        working-directory: frontend/android
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          if [ "$BUILD_TYPE" = "release-aab" ]; then
            OUT=$(find app/build/outputs/bundle -name "*.aab" | head -1)
            KIND="aab"
          else
            OUT=$(find app/build/outputs/apk -name "*.apk" | head -1)
            KIND="apk"
          fi
          if [ -z "$OUT" ]; then
            echo "::error::Gradle reported success but no $KIND was produced."
            ls -R app/build/outputs || true
            exit 1
          fi
          echo "out_path=frontend/android/$OUT"       >> "$GITHUB_OUTPUT"
          echo "out_kind=$KIND"                       >> "$GITHUB_OUTPUT"
          echo "Built: frontend/android/$OUT"
          ls -lh "$OUT"

      - name: Upload build artifact (APK or AAB)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PerkWorth-${{ steps.locate.outputs.out_kind }}-${{ github.sha }}
          path: ${{ steps.locate.outputs.out_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Job summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            KIND="${{ steps.locate.outputs.out_kind }}"
            {
              echo "## 🎉 Build complete ($KIND)"
              echo ""
              if [ "$KIND" = "aab" ]; then
                echo "**Download**: scroll to the **Artifacts** section and click **PerkWorth-aab-${{ github.sha }}**."
                echo ""
                echo "**Upload to Google Play**:"
                echo "1. Go to Play Console → your app → Testing → **Internal testing** (fastest for first upload)"
                echo "2. **Create new release** → drag-drop the .aab"
                echo "3. Fill release notes → **Save** → **Review release** → **Start rollout**"
                echo ""
                echo "First submission also requires: Content rating (IARC questionnaire), Data safety form, Store listing (screenshots + description), Target audience."
              else
                echo "**Download**: click **PerkWorth-apk-${{ github.sha }}** in Artifacts."
                echo "**Sideload**: transfer to phone (Drive / WhatsApp / email), tap to install."
              fi
            } >> $GITHUB_STEP_SUMMARY
          else
            {
              echo "## ❌ Build failed"
              echo ""
              echo "**Diagnostics** are in the **'Diagnose Gradle log on failure'** step above."
              echo "**Full log** is attached as artifact **gradle-build-log-${{ github.run_number }}** — download it and share with support."
              echo ""
              echo "**Fastest next step**: click the Actions tab → this run → download the log artifact → paste the last ~50 lines back in the Emergent chat."
            } >> $GITHUB_STEP_SUMMARY
          fi
